<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 1100 1100" width="100%" height="100%">
  <defs>
    <!-- Градиент для исходящих соединений (Outbounds) - Индиго -->
    <linearGradient id="grad-tr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Градиент для входящих соединений (Inbounds) - Бирюзовый/Голубой -->
    <linearGradient id="grad-tl" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    
    <!-- Градиент для маршрутизации (Routing) - Фиолетовый -->
    <linearGradient id="grad-bl" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    
    <!-- Градиент для политик (Policy/DNS) - Изумрудный/Teal -->
    <linearGradient id="grad-br" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>

    <!-- Легкое свечение для формы -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Базовая форма Xray-core с примененными градиентами и свечением -->
  <g filter="url(#glow)" stroke-linejoin="round" stroke-width="4" stroke="#0f172a">
    <!-- Top-Right -->
    <polygon points="530,470 530,100 650,350 1000,470" fill="url(#grad-tr)" />
    <!-- Top-Left -->
    <polygon points="470,470 100,470 350,350 470,0" fill="url(#grad-tl)" />
    <!-- Bottom-Left -->
    <polygon points="470,530 470,900 350,650 0,530" fill="url(#grad-bl)" />
    <!-- Bottom-Right -->
    <polygon points="530,530 900,530 650,650 530,1000" fill="url(#grad-br)" />
  </g>

  <!-- Элементы топологии (Ноды React Flow на концах) -->
  <circle cx="1000" cy="470" r="25" fill="#f8fafc" />
  <circle cx="470" cy="0" r="25" fill="#f8fafc" />
  <circle cx="0" cy="530" r="25" fill="#f8fafc" />
  <circle cx="530" cy="1000" r="25" fill="#f8fafc" />

  <!-- Центральное ядро (Панель UI / Xray Core) -->
  <!-- Внешнее кольцо -->
  <circle cx="500" cy="500" r="75" fill="#0f172a" stroke="#f8fafc" stroke-width="12" />
  <!-- Внутренний индикатор (Indigo) -->
  <circle cx="500" cy="500" r="25" fill="#6366f1" />
</svg>